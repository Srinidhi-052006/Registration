<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHNOVA 2.0 EVENT REGISTRATION</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="title">
        <h1>TECHNOVA 2.0 EVENT REGISTRATION</h1>
        <p>Fill your details to register for the event</p>
    </div>

    <form action="#" method="post">

        <div class="form-grid">

            <div class="input-box">
                <label>First Name</label>
                <input type="text" name="fname" placeholder="Enter First Name" required>
            </div>

            <div class="input-box">
                <label>Last Name</label>
                <input type="text" name="lname" placeholder="Enter Last Name" required>
            </div>

            <div class="input-box">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter Username" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter Password" required>
            </div>

            <div class="input-box">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter Email" required>
            </div>

            <div class="input-box">
                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="Enter Phone Number" required>
            </div>

            <div class="input-box">
                <label>Age</label>
                <input type="number" name="age" placeholder="Enter Age" required>
            </div>

            <div class="input-box">
                <label>Date of Birth</label>
                <input type="date" name="dob" required>
            </div>

            <div class="input-box">
                <label>College Name</label>
                <input type="text" name="college" placeholder="Enter College Name" required>
            </div>

            <div class="input-box">
                <label>Department</label>
                <input type="text" name="department" placeholder="Enter Department" required>
            </div>

            <div class="input-box">
                <label>Year of Study</label>
                <select name="year" required>
                    <option value="">Select Year</option>
                    <option>1st Year</option>
                    <option>2nd Year</option>
                    <option>3rd Year</option>
                    <option>4th Year</option>
                </select>
            </div>

            <div class="input-box">
                <label>City</label>
                <input type="text" name="city" placeholder="Enter City" required>
            </div>

            <div class="input-box">
                <label>State</label>
                <input type="text" name="state" placeholder="Enter State" required>
            </div>

            <div class="input-box">
                <label>Country</label>
                <input type="text" name="country" placeholder="Enter Country" required>
            </div>

            <div class="input-box">
                <label>Pincode</label>
                <input type="text" name="pincode" placeholder="Enter Pincode" required>
            </div>

            <div class="input-box">
                <label>Emergency Contact</label>
                <input type="text" name="emergency" placeholder="Enter Emergency Contact" required>
            </div>

        </div>

        <div class="gender-section">
            <label class="gender-title">Gender</label>

            <div class="radio-group">
                <label>
                    <input type="radio" name="gender" value="Male" required> Male
                </label>

                <label>
                    <input type="radio" name="gender" value="Female"> Female
                </label>

                <label>
                    <input type="radio" name="gender" value="Other"> Other
                </label>
            </div>
        </div>

        <div class="full-width">
            <label>Address</label>
            <textarea name="address" rows="4" placeholder="Enter Address" required></textarea>
        </div>

        <button type="submit">Register Now</button>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
